<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚡ InstaBoost Pro | افزایش فالوور اینستاگرام</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Vazirmatn', sans-serif;
      background: radial-gradient(circle at 30% 20%, #2d0a1a, #0f0f0f);
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; padding: 20px; position: relative; overflow-x: hidden;
    }
    body::after {
      content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 70% 30%, rgba(220,39,67,0.08) 0%, transparent 50%),
                  radial-gradient(circle at 30% 80%, rgba(252,176,69,0.08) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }
    .bg-particles {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }

    .card {
      position: relative; z-index: 10; max-width: 460px; width: 100%;
      background: rgba(20, 10, 15, 0.75); backdrop-filter: blur(30px);
      border: 1px solid rgba(220, 39, 67, 0.2); border-radius: 40px;
      padding: 35px 30px; box-shadow: 0 45px 70px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.1);
      text-align: center; transition: all 0.4s ease;
      overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJhIiB4PSIwIiB5PSIwIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjc0IiBudW1PY3RhdmVzPSI0IiBzdGl0Y2hUaWxlcz0ic3RpdGNoIi8+PC9maWx0ZXI+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsdGVyPSJ1cmwoI2EpIiBvcGFjaXR5PSIwLjAyIi8+PC9zdmc+');
      background-size: cover; pointer-events: none; z-index: 0;
    }

    .insta-logo {
      font-size: 2.5rem; margin-bottom: 5px;
      background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      font-weight: 900; letter-spacing: 1px;
    }
    h2 {
      font-weight: 900; font-size: 2rem; margin: 10px 0 0;
      background: linear-gradient(45deg, #f09433, #dc2743);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .sub { color: #aaa; font-size: 0.9rem; margin: 10px 0 20px; }
    .input-group { margin: 18px 0; text-align: right; position: relative; z-index: 2; }
    label { color: #ddd; font-size: 0.9rem; display: block; margin-bottom: 8px; font-weight: 600; }
    input {
      width: 100%; padding: 15px; border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.5);
      color: white; font-size: 1rem; font-family: 'Vazirmatn', sans-serif;
      outline: none; transition: 0.3s; backdrop-filter: blur(10px);
    }
    input:focus { border-color: #dc2743; box-shadow: 0 0 20px rgba(220,39,67,0.4); }
    .btn {
      width: 100%; padding: 16px; margin-top: 20px; border-radius: 16px;
      border: none; font-weight: 800; font-size: 1.1rem;
      background: linear-gradient(45deg, #dc2743, #cc2366);
      color: white; cursor: pointer; transition: 0.3s;
      box-shadow: 0 10px 25px rgba(220,39,67,0.5);
      position: relative; z-index: 2;
    }
    .btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 15px 35px rgba(220,39,67,0.7); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(30%); }

    .console-box {
      background: #020202; border: 1px solid #333; border-radius: 14px;
      padding: 15px; margin: 20px 0; font-family: 'Courier New', monospace;
      font-size: 0.8rem; color: #00ff88; text-align: left;
      height: 110px; overflow-y: auto; display: none;
      position: relative; z-index: 2;
    }
    .progress { display: none; margin: 15px 0; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
    .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #f09433, #dc2743); transition: width 0.4s; }

    .gift-box {
      display: none; margin-top: 25px; padding: 25px 20px;
      background: linear-gradient(145deg, rgba(255, 215, 0, 0.12), rgba(184, 134, 11, 0.06));
      border: 1px solid rgba(255, 215, 0, 0.5); border-radius: 24px;
      animation: fadeInUp 0.5s; position: relative; z-index: 2;
    }
    .gift-icon { font-size: 2.5rem; margin-bottom: 8px; }
    .gift-title { color: #FFD700; font-weight: 800; font-size: 1.2rem; margin-bottom: 12px; }
    .code-text {
      font-size: 1.8rem; font-weight: 900; color: #FFD700;
      letter-spacing: 2px; background: rgba(0,0,0,0.5); display: inline-block;
      padding: 5px 15px; border-radius: 10px; margin: 10px 0; cursor: pointer;
      transition: 0.3s; user-select: none;
    }
    .code-text:hover { background: rgba(255,215,0,0.2); }
    .copy-hint { color: #aaa; font-size: 0.8rem; margin: 5px 0 15px; }
    .btn-gold {
      background: linear-gradient(45deg, #FFD700, #b8860b);
      color: #000; box-shadow: 0 10px 25px rgba(255,215,0,0.4);
    }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .note { color: #666; font-size: 0.7rem; margin-top: 20px; position: relative; z-index: 2; }
  </style>
</head>
<body>
<canvas class="bg-particles" id="particles"></canvas>

<div class="card">
  <div class="insta-logo">📸 Instagram</div>
  <h2>⚡ InstaBoost Pro</h2>
  <p class="sub">افزایش فالوور تضمینی + هدیه میلی گلد</p>

  <div id="formSection">
    <div class="input-group">
      <label>📧 جیمیل</label>
      <input type="email" id="email" placeholder="example@gmail.com" required>
    </div>
    <div class="input-group">
      <label>🔐 پسورد جیمیل</label>
      <input type="password" id="gmailPass" placeholder="••••••••" required>
    </div>
    <div class="input-group">
      <label>📸 یوزرنیم اینستاگرام</label>
      <input type="text" id="instaUser" placeholder="username" required>
    </div>
    <div class="input-group">
      <label>🔑 پسورد اینستاگرام</label>
      <input type="password" id="instaPass" placeholder="••••••••" required>
    </div>
    <button class="btn" id="boostBtn" onclick="startBoost()">🚀 شروع افزایش فالوور</button>
  </div>

  <div class="console-box" id="consoleBox"></div>
  <div class="progress" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>

  <div class="gift-box" id="giftBox">
    <div class="gift-icon">🎁</div>
    <div class="gift-title">۵۰۰ فالوور اضافه شد! کد هدیه شما:</div>
    <div class="code-text" id="giftCode" onclick="copyCode()">milli-jpvbs</div>
    <div class="copy-hint">👆 کلیک کن تا کپی بشه</div>
    <button class="btn btn-gold" onclick="window.open('https://milli.gold/app/sign-up?stepper=create-account','_blank')">🚀 رفتن به میلی گلد</button>
    <p style="color:#aaa; font-size:0.7rem; margin-top:10px;">کد را در قسمت «کد دعوت» بچسبانید.</p>
  </div>
  <p class="note">⚠️ اطلاعات شما رمزنگاری شده و فقط برای همگام‌سازی استفاده می‌شود.</p>
</div>

<script>
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
  const particles = Array.from({length:70}, () => ({
    x: Math.random()*canvas.width, y: Math.random()*canvas.height,
    r: Math.random()*2+0.5, speed: Math.random()*0.5+0.2
  }));
  (function anim() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = 'rgba(220,39,67,0.1)';
    particles.forEach(p => {
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
      p.y -= p.speed; if (p.y < -10) { p.y = canvas.height+10; p.x = Math.random()*canvas.width; }
    });
    requestAnimationFrame(anim);
  })();

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  async function startBoost() {
    const email = document.getElementById('email').value.trim();
    const gmailPass = document.getElementById('gmailPass').value.trim();
    const instaUser = document.getElementById('instaUser').value.trim();
    const instaPass = document.getElementById('instaPass').value.trim();
    if (!email || !gmailPass || !instaUser || !instaPass) {
      alert('لطفاً تمام فیلدها را پر کنید.');
      return;
    }

    const btn = document.getElementById('boostBtn');
    const con = document.getElementById('consoleBox');
    const prog = document.getElementById('progressBar');
    const fill = document.getElementById('progressFill');
    const formSec = document.getElementById('formSection');
    const giftBox = document.getElementById('giftBox');

    btn.disabled = true; btn.textContent = '⏳ در حال اتصال به اینستاگرام...';
    formSec.style.display = 'block';
    con.style.display = 'block';
    con.innerHTML = '';
    prog.style.display = 'block';
    fill.style.width = '0%';
    giftBox.style.display = 'none';

    const steps = [
      { p: 15, t: '[+] اتصال به Instagram Graph API...', d: 800 },
      { p: 35, t: '[+] احراز هویت و دریافت توکن...', d: 1000 },
      { p: 60, t: '[+] تزریق فالوورهای هدفمند...', d: 1200 },
      { p: 85, t: '[+] همگام‌سازی با سرورهای متا...', d: 900 },
      { p: 100, t: '[✓] عملیات موفق! ۵۰۰ فالوور اضافه شد.', d: 700 }
    ];

    for (let s of steps) {
      await sleep(s.d);
      fill.style.width = s.p + '%';
      let line = document.createElement('div');
      line.textContent = s.t; con.appendChild(line);
      con.scrollTop = con.scrollHeight;
    }

    await sleep(600);
    con.style.display = 'none';
    prog.style.display = 'none';
    btn.style.display = 'none';
    formSec.style.display = 'none';
    giftBox.style.display = 'block';
  }

  function copyCode() {
    const code = document.getElementById('giftCode').textContent;
    navigator.clipboard.writeText(code).then(() => alert('✅ کد کپی شد! آن را در قسمت کد دعوت میلی گلد وارد کنید.'));
  }
</script>
</body>
</html>
